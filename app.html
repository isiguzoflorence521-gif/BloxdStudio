<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BloxdStudio — App</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23007acc'/><text x='50' y='58' font-size='52' text-anchor='middle' fill='white' font-family='Arial'>B</text></svg>">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #9ca3af;
      --primary: #60a5fa;
      --text: #e5e7eb;
      --accent: #22c55e;
      --danger: #ef4444;
      --border: #1f2937;
    }
    * { box-sizing: border-box }
    html, body { height: 100% }
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
      display: grid;
      grid-template-rows: 56px 1fr 26px;
      grid-template-columns: 280px 1fr;
      grid-template-areas:
        "topbar topbar"
        "sidebar main"
        "status status";
    }
    /* Topbar */
    header {
      grid-area: topbar;
      display: flex; align-items: center; gap: 12px;
      padding: 0 14px;
      background: #0b1220; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    header .app-title { font-weight: 700; letter-spacing: .3px }
    header .spacer { flex: 1 }
    header .btn { padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 8px; background: #0f172a; color: var(--text); cursor: pointer }
    header .btn.primary { border-color: #1d4ed8; background: #0b1220; color: var(--primary) }
    /* Sidebar */
    aside {
      grid-area: sidebar;
      background: #0c1220; border-right: 1px solid var(--border);
      padding: 12px;
      display: grid; grid-auto-rows: min-content; gap: 12px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .panel h3 { margin: 0 0 8px 0; font-size: 14px; color: var(--muted); font-weight: 600 }
    input[type="file"], select, input[type="text"] {
      width: 100%; padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: #0b1220; color: var(--text);
    }
    .row { display: flex; gap: 8px; align-items: center }
    .row > * { flex: 1 }
    .btn { padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
      background: #0f172a; color: var(--text); cursor: pointer }
    .btn.accent { border-color: #14532d; color: var(--accent) }
    .btn.danger { border-color: #7f1d1d; color: var(--danger) }
    /* Main */
    main {
      grid-area: main; display: grid;
      grid-template-rows: 1fr 220px; gap: 12px; padding: 12px;
    }
    #viewport {
      background: #0b1220; border-radius: 12px;
      border: 1px solid var(--border); position: relative; overflow: hidden;
      display: grid; place-items: center;
    }
    #viewport canvas { width: 100%; height: 100% }
    #console {
      background: #0b1220; border-radius: 12px; border: 1px solid var(--border);
      padding: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px; overflow: auto; white-space: pre-wrap; line-height: 1.35;
    }
    /* Status bar */
    footer {
      grid-area: status; display: flex; gap: 12px; align-items: center;
      padding: 4px 10px; border-top: 1px solid var(--border); background: #0b1220; color: var(--muted);
      font-size: 12px;
    }
    .pill { padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border) }
    a, a:visited { color: var(--primary); text-decoration: none }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <header>
    <div class="app-title">🧊 BloxdStudio</div>
    <div class="pill" id="projectName">No project</div>
    <div class="spacer"></div>
    <button class="btn" id="btnOpen">Open</button>
    <button class="btn primary" id="btnSave">Export</button>
  </header>

  <!-- Sidebar -->
  <aside>
    <section class="panel">
      <h3>Project</h3>
      <div class="row">
        <input type="text" id="projTitle" placeholder="Project name" />
        <button class="btn" id="btnNew">New</button>
      </div>
      <div style="margin-top:8px" class="row">
        <input type="file" id="fileOpen" accept=".json,.bloxdschem,.zip" />
      </div>
    </section>

    <section class="panel">
      <h3>Map</h3>
      <div class="row">
        <select id="worldPreset">
          <option value="flat">Flat</option>
          <option value="islands">Islands</option>
          <option value="noise">Noise</option>
        </select>
        <button class="btn accent" id="btnGen">Generate</button>
      </div>
    </section>

    <section class="panel">
      <h3>Textures</h3>
      <div class="row">
        <input type="file" id="texturePack" accept=".zip,.json" />
        <button class="btn" id="btnApplyTextures">Apply</button>
      </div>
    </section>

    <section class="panel">
      <h3>Schematics</h3>
      <div class="row">
        <input type="file" id="schemFile" accept=".schem,.bloxdschem,.json" />
        <button class="btn" id="btnImport">Import</button>
      </div>
      <div class="row" style="margin-top:6px">
        <button class="btn" id="btnExportJSON">Export JSON</button>
        <button class="btn" id="btnExportNative">Export .bloxdschem</button>
      </div>
    </section>

    <section class="panel">
      <h3>Build</h3>
      <div class="row">
        <button class="btn" id="btnCompile">Compile</button>
        <button class="btn danger" id="btnClear">Clear</button>
      </div>
    </section>
  </aside>

  <!-- Main -->
  <main>
    <div id="viewport">
      <canvas id="canvas"></canvas>
    </div>
    <div id="console" aria-live="polite"></div>
  </main>

  <!-- Status -->
  <footer>
    <div>Status: <span id="statusText">Idle</span></div>
    <div class="pill" id="fps">FPS: —</div>
    <div class="pill">Core ready</div>
  </footer>

  <!-- App bootstrap: import your core engines -->
  <script type="module">
    // Adjust these paths if your files are placed differently.
    import * as Compiler from './core/compiler.js';
    import * as MapEngine from './core/map-engine.js';
    import * as Schematic from './core/schematic-handler.js';
    import * as TextureEngine from './core/texture-engine.js';

    // ---- DOM helpers ----
    const $ = (sel) => document.querySelector(sel);
    const logEl = $('#console');
    const statusEl = $('#statusText');
    const fpsEl = $('#fps');
    const projNameEl = $('#projectName');
    const canvas = $('#canvas');
    const ctx = canvas.getContext('2d');

    function log(...args) {
      const line = args.map(a => (typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a))).join(' ');
      logEl.textContent += line + '\\n';
      logEl.scrollTop = logEl.scrollHeight;
      console.debug('[BloxdStudio]', ...args);
    }
    function setStatus(t) { statusEl.textContent = t }

    // ---- Resize canvas to fill viewport ----
    function fitCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
    }
    new ResizeObserver(fitCanvas).observe($('#viewport'));

    // ---- Simple preview loop (placeholder renderer) ----
    let last = performance.now();
    let frames = 0, accum = 0;
    function loop(ts) {
      const dt = (ts - last) / 1000; last = ts; frames++; accum += dt;
      if (accum >= 1) { fpsEl.textContent = 'FPS: ' + frames; frames = 0; accum = 0 }
      // Clear
      ctx.fillStyle = '#0a0f1f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Demo grid
      ctx.strokeStyle = '#1f2937';
      ctx.lineWidth = 1;
      const step = 32;
      for (let x = 0; x < canvas.width; x += step) {
        ctx.beginPath(); ctx.moveTo(x + .5, 0); ctx.lineTo(x + .5, canvas.height); ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += step) {
        ctx.beginPath(); ctx.moveTo(0, y + .5); ctx.lineTo(canvas.width, y + .5); ctx.stroke();
      }

      // Title watermark
      ctx.fillStyle = '#60a5fa';
      ctx.font = '600 18px ui-sans-serif, Segoe UI, Roboto, Arial';
      ctx.fillText('BloxdStudio Viewport', 16, 28);

      requestAnimationFrame(loop);
    }

    // ---- App State ----
    const State = {
      projectName: 'Untitled',
      world: null,
      textures: null,
      schema: null
    };

    // ---- Wire UI ----
    $('#btnNew').onclick = () => {
      const name = $('#projTitle').value.trim() || 'Untitled';
      State.projectName = name; projNameEl.textContent = name;
      log('New project:', name);
    };

    $('#btnOpen').onclick = () => $('#fileOpen').click();

    $('#fileOpen').addEventListener('change', async (ev) => {
      const file = ev.target.files?.[0];
      if (!file) return;
      setStatus('Opening ' + file.name + ' …');
      try {
        const text = await file.text();
        // You can branch by extension if needed
        State.schema = await Schematic.importFromText?.(text) ?? JSON.parse(text);
        log('Opened:', file.name);
      } catch (err) {
        console.error(err);
        log('Error opening file:', err.message || err);
      } finally {
        setStatus('Idle');
      }
    });

    $('#btnGen').onclick = async () => {
      const preset = $('#worldPreset').value;
      setStatus('Generating world (' + preset + ') …');
      try {
        State.world = await (MapEngine.generate?.(preset) ?? { preset, size: [64, 64, 64] });
        log('World generated:', State.world);
      } catch (err) {
        log('Map generation failed:', err.message || err);
      } finally {
        setStatus('Idle');
      }
    };

    $('#btnApplyTextures').onclick = async () => {
      const file = $('#texturePack').files?.[0];
      if (!file) return log('No texture pack selected');
      setStatus('Applying textures …');
